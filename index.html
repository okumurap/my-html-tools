<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ブラウザだけで使える、小さく便利なHTMLツール集です。">
  <title>My HTML Tools</title>
  <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a class="site-name" href="./index.html" aria-label="My HTML Tools ホーム">My HTML Tools</a>
    </div>
  </header>

  <main>
    <section class="hero" aria-labelledby="page-title">
      <div class="container">
        <p class="eyebrow">Simple tools, right in your browser</p>
        <h1 id="page-title">ブラウザで使える<br>小さな便利ツール</h1>
        <p class="lead">
          インストール不要。PCでもスマートフォンでも、必要なときにすぐ使えるツールを公開しています。
        </p>
      </div>
    </section>

    <section class="tools-section" aria-labelledby="tools-title">
      <div class="container">
        <div class="section-heading">
          <h2 id="tools-title">ツール一覧</h2>
          <span class="tool-count" aria-label="公開中のツール数 0">0 tools</span>
        </div>

        <div class="empty-state">
          <p class="empty-state__title">最初のツールを準備中です</p>
          <p>公開したツールは、ここからすぐに開けるようになります。</p>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; My HTML Tools</p>
    </div>
  </footer>
</body>
</html>
