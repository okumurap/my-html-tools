<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ブラウザで踏切の遮断機・警報灯・列車通過を操作できるミニ踏切アプリです。">
  <title>踏切アプリ | My HTML Tools</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="app-shell">
    <nav class="breadcrumb" aria-label="パンくずリスト">
      <a href="../../index.html">ツール一覧へ戻る</a>
    </nav>

    <section class="hero" aria-labelledby="app-title">
      <p class="eyebrow">Train Crossing</p>
      <h1 id="app-title">踏切アプリ</h1>
      <p class="lead">
        警報灯、遮断機、列車の通過をブラウザ上で動かせる、シンプルな踏切シミュレーターです。
      </p>
    </section>

    <section class="crossing-card" aria-label="踏切シミュレーター">
      <div class="sky" aria-hidden="true">
        <span class="cloud cloud-one"></span>
        <span class="cloud cloud-two"></span>
      </div>

      <div class="scene" id="scene">
        <div class="warning-sign" aria-hidden="true">
          <span class="sign-bar sign-bar-a"></span>
          <span class="sign-bar sign-bar-b"></span>
        </div>

        <div class="signal" aria-label="警報灯">
          <span class="lamp lamp-left"></span>
          <span class="lamp lamp-right"></span>
        </div>

        <div class="gate gate-left" aria-hidden="true">
          <span class="gate-arm"></span>
        </div>
        <div class="gate gate-right" aria-hidden="true">
          <span class="gate-arm"></span>
        </div>

        <div class="track" aria-hidden="true">
          <span class="rail rail-top"></span>
          <span class="rail rail-bottom"></span>
          <span class="sleeper sleeper-1"></span>
          <span class="sleeper sleeper-2"></span>
          <span class="sleeper sleeper-3"></span>
          <span class="sleeper sleeper-4"></span>
        </div>

        <div class="train" aria-hidden="true">
          <span class="train-window"></span>
          <span class="train-window"></span>
          <span class="train-window"></span>
        </div>
      </div>

      <p class="status" id="status" role="status" aria-live="polite">待機中です。ボタンで踏切を操作できます。</p>
    </section>

    <section class="controls" aria-labelledby="controls-title">
      <h2 id="controls-title">操作</h2>
      <div class="button-row">
        <button type="button" id="startButton">踏切を鳴らす</button>
        <button type="button" id="trainButton">列車を通過</button>
        <button type="button" id="resetButton" class="secondary">リセット</button>
      </div>
      <p class="note">音は使わず、画面の点滅と動きだけで楽しめます。スマートフォンでも操作しやすい大きめのボタンにしています。</p>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
