<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="画面をタップして、駅から踏切とトンネルを越えて電車を走らせるミニゲームです。">
  <meta name="theme-color" content="#8edcff">
  <title>でんしゃを走らせよう！ | My HTML Tools</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <canvas id="game" aria-label="タップして電車を走らせるゲーム"></canvas>

  <header class="topbar">
    <a class="back-link" href="../../index.html" aria-label="ツール一覧へ戻る">←</a>
    <p class="title">🚆 でんしゃゲーム</p>
    <div class="buttons">
      <button type="button" id="soundButton" aria-label="音を切る" title="音を切る">🔊</button>
      <button type="button" id="fullscreenButton" aria-label="全画面で表示" title="全画面で表示">⛶</button>
    </div>
  </header>

  <div class="progress" aria-label="えき、ふみきり、トンネル、とうちゃくの進行状況">
    <span class="dot is-current" aria-label="えき"></span>
    <span class="dot" aria-label="ふみきり"></span>
    <span class="dot" aria-label="トンネル"></span>
    <span class="dot" aria-label="とうちゃく"></span>
  </div>

  <div id="tapCard" class="tap-card">
    <span id="cardTitle" class="tap-card__title">タップで しゅっぱつ！</span>
    <span id="cardText" class="tap-card__text">えき → ふみきり → トンネル</span>
  </div>

  <p class="hint">どこをタップしてもOK</p>
  <p id="status" class="visually-hidden" role="status" aria-live="polite">タップすると電車が出発します。</p>

  <script src="./script.js"></script>
</body>
</html>
